# Production — one container running API + web on a single port (8082),
# routed through the VPS's existing Traefik via labels. No separate API
# domain/port and no per-service routing to keep in sync — Traefik only
# ever needs to find one router for this whole app.
#
# Build/run with: docker compose --env-file .env.prod -f docker-compose.prod-custom.yml <cmd>
# COMPOSE_PROJECT_NAME (set by compose to the project/folder name, or override
# with -p) names the Traefik router/service — keeps labels unique per deployment
# without hardcoding a name that could collide with another app on the same Traefik.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID}
        NEXT_PUBLIC_MICROSOFT_REDIRECT_URI: ${NEXT_PUBLIC_MICROSOFT_REDIRECT_URI}
    env_file:
      - apps/api/.env.prod
    environment:
      NODE_ENV: production
    ports:
      - "0.0.0.0:8082:8082"
    restart: unless-stopped
    networks:
      - posp-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.rule=Host(`${DOMAIN_APP}`)"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.${COMPOSE_PROJECT_NAME}.service=${COMPOSE_PROJECT_NAME}"
      - "traefik.http.services.${COMPOSE_PROJECT_NAME}.loadbalancer.server.port=8082"

networks:
  posp-prod:
