# Production — one container running API + web on a single port (3000),
# routed through the VPS's existing Traefik via labels. No separate API
# domain/port and no per-service routing to keep in sync — Traefik only
# ever needs to find one router for this whole app.
#
# Build/run with: docker compose --env-file .env.prod -f docker-compose.prod-custom.yml <cmd>
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID}
        NEXT_PUBLIC_MICROSOFT_REDIRECT_URI: ${NEXT_PUBLIC_MICROSOFT_REDIRECT_URI}
    env_file:
      - apps/api/.env.prod
    environment:
      NODE_ENV: production
    ports:
      - "0.0.0.0:3000:3000"
    restart: unless-stopped
    networks:
      - posp-prod
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.posp-app.rule=Host(`${DOMAIN_APP}`)"
      - "traefik.http.routers.posp-app.entrypoints=websecure"
      - "traefik.http.routers.posp-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.posp-app.service=posp-app"
      - "traefik.http.services.posp-app.loadbalancer.server.port=3000"

networks:
  posp-prod:
