# Local development — Node.js API and Next.js UI containers
# DATABASE_URL in apps/api/.env should point to your remote PostgreSQL instance
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/api/.env
    restart: unless-stopped
    networks:
      - posp-dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID}
        NEXT_PUBLIC_MICROSOFT_REDIRECT_URI: ${NEXT_PUBLIC_MICROSOFT_REDIRECT_URI:-http://localhost:3000/auth/callback}
    ports:
      - "3000:3000"
    env_file:
      - apps/web/.env.local
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - posp-dev

networks:
  posp-dev:
