# Local development — one container running API + web on a single port (3000).
# docker-compose.yml auto-loads ./.env for the build args below.
# Runtime secrets (DATABASE_URL, JWT secret, etc.) come from apps/api/.env.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-/api/v1}
        NEXT_PUBLIC_MICROSOFT_CLIENT_ID: ${NEXT_PUBLIC_MICROSOFT_CLIENT_ID}
        NEXT_PUBLIC_MICROSOFT_TENANT_ID: ${NEXT_PUBLIC_MICROSOFT_TENANT_ID}
        NEXT_PUBLIC_MICROSOFT_REDIRECT_URI: ${NEXT_PUBLIC_MICROSOFT_REDIRECT_URI:-http://localhost:3000/auth/callback}
    ports:
      - "3000:3000"
    env_file:
      - apps/api/.env
    restart: unless-stopped
